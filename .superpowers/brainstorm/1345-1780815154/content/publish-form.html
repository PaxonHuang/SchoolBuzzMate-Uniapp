<h2>商品发布表单设计</h2>
<p class="subtitle">选择你觉得最适合的发布表单布局</p>

<div class="cards">
  <div class="card" data-choice="simple" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">极简发布</div>
        <div class="mockup-body" style="padding: 12px;">
          <div style="background: #f5f5f5; height: 100px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; border: 2px dashed #ccc;">
            <span style="color: #999; font-size: 13px;">+ 添加图片 (最多3张)</span>
          </div>
          <div class="mock-input" style="margin-bottom: 8px;" placeholder="商品标题"></div>
          <div class="mock-input" style="margin-bottom: 8px;" placeholder="价格"></div>
          <div style="display: flex; gap: 8px; margin-bottom: 8px;">
            <div style="padding: 6px 12px; background: #f5f5f5; border-radius: 4px; font-size: 12px;">分类 ▼</div>
            <div style="padding: 6px 12px; background: #f5f5f5; border-radius: 4px; font-size: 12px;">成色 ▼</div>
          </div>
          <div class="mock-input" style="height: 60px;" placeholder="简单描述..."></div>
          <button class="mock-button" style="width: 100%; margin-top: 12px; background: #07c160;">发布</button>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>极简发布 (3张图)</h3>
      <p>核心字段：图片+标题+价格+分类+成色+描述</p>
      <div class="pros-cons" style="margin-top: 12px;">
        <div class="pros"><h4>优点</h4><ul><li>发布快，转化率高</li><li>字段精简，用户无压力</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>信息较少</li><li>图片展示有限</li></ul></div>
      </div>
    </div>
  </div>

  <div class="card" data-choice="standard" onclick="toggleSelect(this)">
    <div class="card-image">
      <div class="mockup">
        <div class="mockup-header">标准发布</div>
        <div class="mockup-body" style="padding: 12px;">
          <div style="display: flex; gap: 8px; margin-bottom: 12px;">
            <div style="width: 80px; height: 80px; background: #f5f5f5; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 2px dashed #ccc;">
              <span style="color: #07c160; font-size: 20px;">+</span>
            </div>
            <div style="width: 80px; height: 80px; background: #e8f8e8; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
              <span style="color: #999; font-size: 11px;">图1</span>
            </div>
            <div style="width: 80px; height: 80px; background: #e8f8e8; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
              <span style="color: #999; font-size: 11px;">图2</span>
            </div>
            <div style="width: 80px; height: 80px; background: #e8f8e8; border-radius: 8px; display: flex; align-items: center; justify-content: center;">
              <span style="color: #999; font-size: 11px;">图3</span>
            </div>
          </div>
          <div style="font-size: 11px; color: #666; margin-bottom: 8px;">最多上传 6 张图片</div>
          <div class="mock-input" style="margin-bottom: 8px;" placeholder="商品标题 (必填)"></div>
          <div style="display: flex; gap: 8px; margin-bottom: 8px;">
            <div class="mock-input" style="width: 60%;" placeholder="售价 ¥"></div>
            <div class="mock-input" style="width: 40%;" placeholder="原价 ¥"></div>
          </div>
          <div style="display: flex; gap: 8px; margin-bottom: 8px;">
            <div style="padding: 8px 12px; background: #f5f5f5; border-radius: 4px; font-size: 12px; flex: 1;">📚 教材</div>
            <div style="padding: 8px 12px; background: #f5f5f5; border-radius: 4px; font-size: 12px; flex: 1;">九成新</div>
          </div>
          <div style="display: flex; gap: 8px; margin-bottom: 8px; font-size: 12px;">
            <div style="padding: 6px 10px; background: #07c160; color: white; border-radius: 4px;">📍 自提</div>
            <div style="padding: 6px 10px; background: #f5f5f5; border-radius: 4px;">📦 快递</div>
          </div>
          <div class="mock-input" style="height: 80px;" placeholder="详细描述商品情况、交易方式等..."></div>
          <button class="mock-button" style="width: 100%; margin-top: 12px; background: #07c160;">发布</button>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>标准发布 (6张图)</h3>
      <p>完整信息：多图+原价+交易方式+详细描述</p>
      <div class="pros-cons" style="margin-top: 12px;">
        <div class="pros"><h4>优点</h4><ul><li>信息完整</li><li>多图展示更直观</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>填写项多</li><li>发布耗时较长</li></ul></div>
      </div>
    </div>
  </div>
</div>

<p style="margin-top: 24px; font-size: 13px; color: #666;">点击选择你偏好的发布表单设计</p>
